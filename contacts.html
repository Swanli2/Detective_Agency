<section class="contact-section">
    <h2>Зв’яжіться з нами</h2>

    <p>
        Якщо вам потрібна допомога або консультація — залиште повідомлення.
    </p>

    <form>
        <label for="name">Ваше ім’я:</label>
        <input type="text" id="name" placeholder="Введіть ім'я">

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Введіть email">

        <label for="message">Повідомлення:</label>
        <textarea id="message" rows="6" placeholder="Ваше повідомлення"></textarea>

        <button type="submit">Відправити</button>
    </form>
</section>
